<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso Segundo Parcial</title>
    <style>
        body{
            background-color: gray;
            margin: 3%;
            padding: 3%;
        }
        label{
            color: white;
        }
        form{
            background-color: black;
        }
        h3{
            color: white;
        }
        #renta_autos{
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>
    <form>
    <img src="imagenes/LogoAgenciaAutos.png" width="200" height="180">
    <h3 id="renta_autos">Renta de Autos de Lujo</h3>
    <h3>Datos del Cliente</h3>
    <hr>


        <label for="nombre">Nombre</label>
        <input type="text" id="nombre">

        <label for="direccion">Direccion</label>
        <input type="text" id="direccion">

        <label for="telefono">Telefono</label>
        <input type="number" id="telefono">

        <label for="email">Email</label>
        <input type="email" id="email">
    <hr>
        <label for="fecha">Fecha de Renta</label>
        <input type="number" id="fecha" style="width: 30px;">
        <select>
            <option>Enero</option>
            <option>Febrero</option>
            <option>Marzo</option>
            <option>Abril</option>
            <option>Mayo</option>
            <option>Junio</option>
            <option>Julio</option>
            <option>Agosto</option>
            <option>Septiembre</option>
            <option>Novienbre</option>
            <option>Diciembre</option>
        </select>

        <label for="dias">Numero de Dias</label>
        <input type="number" id="dias" style="width: 60px;">

    </form>
</body>
</html>
